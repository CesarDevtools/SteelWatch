<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelwatch</title>
  <link rel="stylesheet" href="./css/styles.css">
   <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <div class="arena">
    
    <h1 class="game-title">Steelwatch</h1>

    <div class="fighters">

      <div class="fighter player">
        <div class="stats">
          <h2 id="player-name">Knight</h2>
          <p>HP: <span id="player-hp"></span></p>
        </div>
        <div class="sprite idle" id="player-sprite"></div>
      </div>

      <div class="fighter enemy">
        <div class="stats">
          <h2 id="enemy-name">Traitor</h2>
          <p>HP: <span id="enemy-hp"></span></p>
        </div>
        <div class="sprite idle" id="enemy-sprite"></div>
      </div>

    </div>
  </div>

  
  <script src="js/Character.js"></script>
  <script src="js/Enemy.js"></script>
  <script src="js/Game.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
